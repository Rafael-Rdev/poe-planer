<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Einkaufsliste</title>
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        max-width: 600px;
        margin: 0 auto;
        padding: 20px;
        background-color: #f5f5f5;
        color: #333;
      }
      h1 {
        color: #2c3e50;
      }
      #status {
        margin-bottom: 20px;
        padding: 10px;
        border-radius: 4px;
        background-color: #e8f5e9;
        color: #2e7d32;
        display: none;
      }
    </style>
  </head>
  <body>
    <h1>Einkaufsliste</h1>
    <div id="status">Firebase ist konfiguriert!</div>
    <div id="app">
      <p>Hier wird die Einkaufsliste geladen...</p>
    </div>

    <!-- Firebase SDK (CDN) -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
      import { getFirestore } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

      // Firebase Configuration
      const firebaseConfig = {
        apiKey: "your-api-key",
        authDomain: "your-project.firebaseapp.com",
        projectId: "your-project-id",
        storageBucket: "your-project.appspot.com",
        messagingSenderId: "123456789",
        appId: "1:123456789:web:abcdef"
      };

      try {
        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        console.log("Firebase erfolgreich initialisiert.");

        // Zeige Erfolgsmeldung an, da die Config jetzt direkt injiziert ist
        document.getElementById('status').style.display = 'block';
      } catch (error) {
        console.error("Fehler bei der Firebase-Initialisierung:", error);
        document.getElementById('app').innerHTML = `<p style="color: red;">Fehler: ${error.message}</p>`;
      }
    </script>
  </body>
</html>
